<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>풍무농산 관리자</title>
  <style>
    @import url("https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css");
    @import url("https://fonts.googleapis.com/css2?family=Song+Myung&display=swap");
    :root { --ink:#080d0b; --muted:#6e7772; --line:#e2e7e3; --paper:#fffefa; --soft:#f5f7f3; --teal:#075f55; --dark:#033f38; --mint:#e7f3ed; --gold:#d7a642; --red:#d94235; }
    * { box-sizing: border-box; }
    body { margin:0; min-width:320px; color:var(--ink); font-family:"SUIT Variable",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#edf1ec; }
    button,input,select { font:inherit; color:inherit; }
    button { border:0; background:none; cursor:pointer; }
    .app { max-width:480px; min-height:100vh; margin:0 auto; background:#f8faf6; box-shadow:0 0 0 1px rgba(0,0,0,.06); }
    .topbar { position:sticky; top:0; z-index:10; height:78px; display:grid; grid-template-columns:74px 1fr 74px; align-items:center; padding:10px 13px; background:rgba(255,254,250,.96); border-bottom:1px solid var(--line); backdrop-filter:blur(18px); }
    .brand { text-align:center; font-family:"Song Myung",serif; font-size:25px; line-height:1; }
    .brand small { display:block; margin-top:5px; color:var(--teal); font-family:"SUIT Variable",sans-serif; font-size:12px; font-weight:900; }
    .nav-btn { height:42px; border-radius:10px; display:grid; place-items:center; color:var(--dark); background:var(--mint); font-size:12px; font-weight:900; }
    .page { padding:14px 12px 36px; }
    .hero { padding:18px; border-radius:14px; color:#fff; background:linear-gradient(135deg,var(--dark),var(--teal)); box-shadow:0 18px 38px rgba(3,63,56,.18); }
    .hero h1 { margin:0; font-size:24px; font-weight:950; }
    .hero p { margin:7px 0 0; color:rgba(255,255,255,.76); font-size:13px; font-weight:750; }
    .metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:14px; }
    .metric { padding:12px 10px; border-radius:12px; background:rgba(255,255,255,.13); }
    .metric small { display:block; color:rgba(255,255,255,.72); font-size:11px; font-weight:800; }
    .metric b { display:block; margin-top:4px; font-size:21px; font-weight:950; }
    .quick { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
    .quick button { height:46px; border-radius:12px; background:#fff; border:1px solid var(--line); font-weight:950; }
    .quick button.active { color:#fff; background:var(--dark); border-color:var(--dark); }
    .section { margin-top:12px; padding:15px; border:1px solid var(--line); border-radius:14px; background:var(--paper); }
    .section-head { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:12px; }
    h2 { margin:0; font-size:18px; font-weight:950; }
    .chip { padding:6px 10px; border-radius:999px; color:var(--dark); background:var(--mint); font-size:12px; font-weight:950; white-space:nowrap; }
    .form-grid { display:grid; grid-template-columns:1.2fr .8fr; gap:8px; }
    .field { display:grid; gap:6px; margin-top:10px; }
    .field label { color:#606a65; font-size:12px; font-weight:900; }
    .input { width:100%; min-height:46px; padding:12px 13px; border:0; border-radius:12px; background:var(--soft); outline:1px solid transparent; font-weight:800; }
    .input:focus { outline-color:var(--teal); background:#fff; }
    .submit { width:100%; height:46px; margin-top:10px; border-radius:12px; color:#fff; background:var(--dark); font-weight:950; }
    .row { display:grid; gap:9px; padding:13px 0; border-top:1px solid var(--line); }
    .row:first-of-type { border-top:0; }
    .row-main { display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center; }
    .row strong { font-size:15px; font-weight:950; }
    .row span { color:#4d5752; font-size:13px; font-weight:750; line-height:1.45; }
    .count { min-width:58px; padding:9px 10px; border-radius:10px; color:#fff; background:var(--dark); text-align:center; font-weight:950; }
    .deal-count { background:#8c5a00; }
    .actions { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
    .actions button { height:40px; border-radius:10px; background:var(--soft); font-size:13px; font-weight:900; }
    .actions .primary { color:#fff; background:var(--dark); }
    .actions .danger { color:#fff; background:var(--red); }
    .toast { position:fixed; left:50%; bottom:18px; transform:translateX(-50%); width:min(440px,calc(100% - 28px)); padding:13px 14px; border-radius:12px; color:#fff; background:rgba(3,63,56,.96); text-align:center; font-weight:950; opacity:0; pointer-events:none; transition:.2s; }
    .toast.show { opacity:1; }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <button class="nav-btn" onclick="location.href='index.html'">주문서</button>
      <div class="brand">풍무농산<small>관리자</small></div>
      <button class="nav-btn" onclick="location.href='orders.html'">주문관리</button>
    </header>
    <section class="page">
      <div class="hero">
        <h1>관리 대시보드</h1>
        <p>재고, 이벤트 특가, 주문 상태를 관리합니다.</p>
        <div class="metrics">
          <div class="metric"><small>재고 품목</small><b id="stockCount">9</b></div>
          <div class="metric"><small>특가</small><b id="dealCount">1</b></div>
          <div class="metric"><small>신규주문</small><b>18</b></div>
        </div>
      </div>
      <div class="quick">
        <button class="active" onclick="document.querySelector('#stock').scrollIntoView({behavior:'smooth'})">재고관리</button>
        <button onclick="document.querySelector('#deals').scrollIntoView({behavior:'smooth'})">특가관리</button>
      </div>

      <section class="section" id="stock">
        <div class="section-head"><h2>재고관리</h2><span class="chip">일반 품목</span></div>
        <div class="form-grid">
          <div class="field" style="margin-top:0"><label for="stockName">품목명</label><input class="input" id="stockName" placeholder="예: 대추방울토마토"></div>
          <div class="field" style="margin-top:0"><label for="stockQty">수량</label><input class="input" id="stockQty" type="number" placeholder="25"></div>
        </div>
        <button class="submit" id="addStock">품목 추가</button>
        <div id="stockList"></div>
      </section>

      <section class="section" id="deals">
        <div class="section-head"><h2>이벤트 특가 관리</h2><span class="chip">재고와 별도</span></div>
        <div class="form-grid">
          <div class="field" style="margin-top:0"><label for="dealName">특가명</label><input class="input" id="dealName" placeholder="예: 파프리카 혼합 3입"></div>
          <div class="field" style="margin-top:0"><label for="dealOpen">오픈시간</label><input class="input" id="dealOpen" placeholder="오후 2시"></div>
        </div>
        <button class="submit" id="addDeal">특가 추가</button>
        <div id="dealList"></div>
      </section>

      <section class="section">
        <div class="section-head"><h2>주문관리 바로가기</h2><span class="chip">별도 페이지</span></div>
        <button class="submit" onclick="location.href='orders.html'">주문관리 페이지로 이동</button>
      </section>
    </section>
  </main>
  <div class="toast" id="toast">저장되었습니다.</div>
  <script>
    let stocks = [
      { name: "담양 설향딸기 600g", qty: 18, price: "7,900원" },
      { name: "대추방울토마토 750g", qty: 25, price: "5,900원" },
      { name: "가정용 혼합사과 2kg", qty: 14, price: "9,900원" },
      { name: "씨없는 청포도 500g", qty: 12, price: "8,900원" },
      { name: "쌈채소 모둠 한 팩", qty: 22, price: "4,500원" }
    ];
    let deals = [{ name: "파프리카 혼합 3입", qty: 13, open: "오후 2시 오픈" }];
    const toast = document.querySelector("#toast");
    const showToast = (msg) => { toast.textContent = msg; toast.classList.add("show"); setTimeout(() => toast.classList.remove("show"), 1500); };
    function renderStocks() {
      document.querySelector("#stockCount").textContent = stocks.length;
      document.querySelector("#stockList").innerHTML = stocks.map((item, i) => `
        <div class="row">
          <div class="row-main"><div><strong>${item.name}</strong><span>${item.price} / 재고 ${item.qty}개</span></div><div class="count">${item.qty}개</div></div>
          <div class="actions"><button class="primary" data-edit-stock="${i}">수정</button><button data-minus-stock="${i}">-1</button><button class="danger" data-del-stock="${i}">삭제</button></div>
        </div>`).join("");
    }
    function renderDeals() {
      document.querySelector("#dealCount").textContent = deals.length;
      document.querySelector("#dealList").innerHTML = deals.map((item, i) => `
        <div class="row">
          <div class="row-main"><div><strong>${item.name}</strong><span>${item.open} / 특가 재고 ${item.qty}개</span></div><div class="count deal-count">${item.qty}개</div></div>
          <div class="actions"><button class="primary" data-edit-deal="${i}">수정</button><button data-minus-deal="${i}">-1</button><button class="danger" data-del-deal="${i}">삭제</button></div>
        </div>`).join("");
    }
    document.querySelector("#addStock").addEventListener("click", () => {
      const name = document.querySelector("#stockName").value.trim();
      const qty = Number(document.querySelector("#stockQty").value || 0);
      if (!name || !qty) return showToast("품목명과 수량을 입력해주세요.");
      stocks.unshift({ name, qty, price: "-" });
      renderStocks(); showToast("품목이 추가되었습니다.");
    });
    document.querySelector("#addDeal").addEventListener("click", () => {
      const name = document.querySelector("#dealName").value.trim();
      const open = document.querySelector("#dealOpen").value.trim() || "오픈시간 미정";
      if (!name) return showToast("특가명을 입력해주세요.");
      deals.unshift({ name, qty: 10, open });
      renderDeals(); showToast("특가가 추가되었습니다.");
    });
    document.body.addEventListener("click", (e) => {
      const ds = e.target.dataset;
      if (ds.delStock) { stocks.splice(Number(ds.delStock), 1); renderStocks(); showToast("삭제되었습니다."); }
      if (ds.minusStock) { const i=Number(ds.minusStock); stocks[i].qty=Math.max(0,stocks[i].qty-1); renderStocks(); }
      if (ds.editStock) { const i=Number(ds.editStock); const name=prompt("품목명 수정", stocks[i].name); if(name){ stocks[i].name=name; renderStocks(); showToast("수정되었습니다."); } }
      if (ds.delDeal) { deals.splice(Number(ds.delDeal), 1); renderDeals(); showToast("특가가 삭제되었습니다."); }
      if (ds.minusDeal) { const i=Number(ds.minusDeal); deals[i].qty=Math.max(0,deals[i].qty-1); renderDeals(); }
      if (ds.editDeal) { const i=Number(ds.editDeal); const open=prompt("오픈시간 수정", deals[i].open); if(open){ deals[i].open=open; renderDeals(); showToast("특가가 수정되었습니다."); } }
    });
    renderStocks(); renderDeals();
  </script>
</body>
</html>
