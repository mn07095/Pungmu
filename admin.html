<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>풍무농산 관리자</title>
  <style>
    @import url("https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css");
    @import url("https://fonts.googleapis.com/css2?family=Song+Myung&display=swap");
    :root{--ink:#07110d;--muted:#66716b;--line:#e2e8e2;--paper:#fffefa;--soft:#f5f8f3;--green:#06483e;--teal:#087465;--mint:#e7f4ee;--gold:#d49a24;--red:#d94435}
    *{box-sizing:border-box}body{margin:0;min-width:320px;color:var(--ink);font-family:"SUIT Variable",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#eaf0eb}button,input{font:inherit;color:inherit}button{border:0;background:none;cursor:pointer}.app{max-width:480px;min-height:100vh;margin:0 auto;background:#fbfcf7;box-shadow:0 0 0 1px rgba(0,0,0,.06)}
    .topbar{position:sticky;top:0;z-index:10;height:82px;display:grid;grid-template-columns:82px 1fr 82px;align-items:center;padding:12px 13px;background:rgba(255,254,250,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(18px)}.brand{text-align:center;font-family:"Song Myung",serif;font-size:26px;line-height:1}.brand small{display:block;margin-top:6px;color:var(--teal);font-family:"SUIT Variable";font-size:12px;font-weight:950}.nav{height:43px;border-radius:11px;color:var(--green);background:var(--mint);font-size:12px;font-weight:950}
    .page{padding:14px 12px 36px}.hero{padding:18px;border-radius:16px;color:#fff;background:linear-gradient(135deg,var(--green),var(--teal));box-shadow:0 18px 38px rgba(6,72,62,.18)}.hero h1{margin:0;font-size:24px;font-weight:950}.hero p{margin:8px 0 0;color:#dceee8;font-size:13px;font-weight:800}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}.metric{padding:12px 10px;border-radius:12px;background:rgba(255,255,255,.14)}.metric small{display:block;color:#dceee8;font-size:11px;font-weight:850}.metric b{display:block;margin-top:4px;font-size:21px}
    .quick{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.quick button{height:46px;border:1px solid var(--line);border-radius:12px;background:#fff;font-weight:950}.quick button:first-child{color:#fff;background:var(--green)}
    .section{margin-top:12px;padding:15px;border:1px solid var(--line);border-radius:14px;background:var(--paper)}.head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}h2{margin:0;font-size:18px;font-weight:950}.chip{padding:6px 10px;border-radius:999px;color:var(--green);background:var(--mint);font-size:12px;font-weight:950}.form{display:grid;grid-template-columns:1fr 96px 86px;gap:8px}.field{display:grid;gap:6px}.field label{color:#5f6b65;font-size:12px;font-weight:900}.input{width:100%;height:46px;padding:12px;border:0;border-radius:12px;background:var(--soft);outline:1px solid transparent;font-weight:850}.input:focus{outline-color:var(--teal);background:#fff}.submit{width:100%;height:46px;margin-top:10px;border-radius:12px;color:#fff;background:var(--green);font-weight:950}.row{display:grid;gap:9px;padding:13px 0;border-top:1px solid var(--line)}.row:first-of-type{border-top:0}.row-main{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}.row strong{font-size:15px;font-weight:950}.row span{display:block;margin-top:3px;color:#4d5752;font-size:13px;font-weight:760}.count{min-width:62px;padding:9px 10px;border-radius:10px;color:#fff;background:var(--green);text-align:center;font-weight:950}.deal-count{background:#8c5a00}.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.actions button{height:40px;border-radius:10px;background:var(--soft);font-size:13px;font-weight:900}.actions .primary{color:#fff;background:var(--green)}.actions .danger{color:#fff;background:var(--red)}.toast{position:fixed;left:50%;bottom:18px;width:min(440px,calc(100% - 28px));transform:translateX(-50%);padding:13px;border-radius:12px;color:#fff;background:rgba(6,72,62,.96);text-align:center;font-weight:950;opacity:0;transition:.2s}.toast.show{opacity:1}@media(max-width:390px){.form{grid-template-columns:1fr 1fr}.form .field:first-child{grid-column:1/3}}
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar"><button class="nav" onclick="location.href='index.html'">주문서</button><div class="brand">풍무농산<small>관리자</small></div><button class="nav" onclick="location.href='orders.html'">주문관리</button></header>
    <section class="page">
      <div class="hero"><h1>관리 대시보드</h1><p>품목, 가격, 재고, 이벤트 특가를 바로 수정합니다.</p><div class="metrics"><div class="metric"><small>재고 품목</small><b id="stockCount">0</b></div><div class="metric"><small>특가</small><b id="dealCount">0</b></div><div class="metric"><small>신규주문</small><b id="newCount">0</b></div></div></div>
      <div class="quick"><button onclick="document.querySelector('#stock').scrollIntoView({behavior:'smooth'})">재고관리</button><button onclick="document.querySelector('#deals').scrollIntoView({behavior:'smooth'})">특가관리</button></div>
      <section class="section" id="stock"><div class="head"><h2>재고관리</h2><span class="chip">일반 품목</span></div><div class="form"><div class="field"><label for="stockName">품목명</label><input class="input" id="stockName" placeholder="대추방울토마토 750g"></div><div class="field"><label for="stockPrice">가격</label><input class="input" id="stockPrice" type="number" placeholder="5900"></div><div class="field"><label for="stockQty">재고</label><input class="input" id="stockQty" type="number" placeholder="25"></div></div><button class="submit" id="addStock">품목 추가</button><div id="stockList"></div></section>
      <section class="section" id="deals"><div class="head"><h2>이벤트 특가 관리</h2><span class="chip">재고와 별도</span></div><div class="form"><div class="field"><label for="dealName">특가명</label><input class="input" id="dealName" placeholder="파프리카 혼합 3입"></div><div class="field"><label for="dealPrice">가격</label><input class="input" id="dealPrice" type="number" placeholder="4900"></div><div class="field"><label for="dealQty">재고</label><input class="input" id="dealQty" type="number" placeholder="13"></div></div><div class="field"><label for="dealOpen">오픈시간</label><input class="input" id="dealOpen" placeholder="오후 2시 오픈"></div><button class="submit" id="addDeal">특가 추가</button><div id="dealList"></div></section>
    </section>
  </main>
  <div class="toast" id="toast"></div>
  <script>
    const money=(v)=>Number(v).toLocaleString("ko-KR")+"원";
    let stocks=JSON.parse(localStorage.getItem("pungmuStocks")||"null")||[{name:"담양 설향딸기 600g",qty:18,price:7900},{name:"대추방울토마토 750g",qty:25,price:5900},{name:"가정용 혼합사과 2kg",qty:14,price:9900},{name:"씨없는 청포도 500g",qty:12,price:8900},{name:"쌈채소 모둠 한 팩",qty:22,price:4500}];
    let deals=JSON.parse(localStorage.getItem("pungmuDeals")||"null")||[{name:"파프리카 혼합 3입",qty:13,price:4900,open:"오후 2시 오픈"}];
    const toast=document.querySelector("#toast");function showToast(msg){toast.textContent=msg;toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),1500)}function save(){localStorage.setItem("pungmuStocks",JSON.stringify(stocks));localStorage.setItem("pungmuDeals",JSON.stringify(deals))}
    function newOrders(){return JSON.parse(localStorage.getItem("pungmuOrders")||"[]").filter((o)=>o.status==="new").length}
    function renderStocks(){document.querySelector("#stockCount").textContent=stocks.length;document.querySelector("#newCount").textContent=newOrders();document.querySelector("#stockList").innerHTML=stocks.map((item,i)=>`<div class="row"><div class="row-main"><div><strong>${item.name}</strong><span>${money(item.price)} / 재고 ${item.qty}개</span></div><div class="count">${item.qty}개</div></div><div class="actions"><button class="primary" data-edit-stock="${i}">수정</button><button data-minus-stock="${i}">-1</button><button class="danger" data-del-stock="${i}">삭제</button></div></div>`).join("")}
    function renderDeals(){document.querySelector("#dealCount").textContent=deals.length;document.querySelector("#dealList").innerHTML=deals.map((item,i)=>`<div class="row"><div class="row-main"><div><strong>${item.name}</strong><span>${money(item.price)} / ${item.open} / 특가 재고 ${item.qty}개</span></div><div class="count deal-count">${item.qty}개</div></div><div class="actions"><button class="primary" data-edit-deal="${i}">수정</button><button data-minus-deal="${i}">-1</button><button class="danger" data-del-deal="${i}">삭제</button></div></div>`).join("")}
    document.querySelector("#addStock").addEventListener("click",()=>{const name=stockName.value.trim(),price=Number(stockPrice.value),qty=Number(stockQty.value);if(!name||!price||!qty)return showToast("품목명, 가격, 재고를 입력해주세요.");stocks.unshift({name,price,qty});stockName.value=stockPrice.value=stockQty.value="";save();renderStocks();showToast("품목이 추가되었습니다.")});
    document.querySelector("#addDeal").addEventListener("click",()=>{const name=dealName.value.trim(),price=Number(dealPrice.value),qty=Number(dealQty.value),open=dealOpen.value.trim()||"오픈시간 미정";if(!name||!price||!qty)return showToast("특가명, 가격, 재고를 입력해주세요.");deals.unshift({name,price,qty,open});dealName.value=dealPrice.value=dealQty.value=dealOpen.value="";save();renderDeals();showToast("특가가 추가되었습니다.")});
    document.body.addEventListener("click",(e)=>{const ds=e.target.dataset;if(ds.delStock){stocks.splice(Number(ds.delStock),1);save();renderStocks();showToast("삭제되었습니다.")}if(ds.minusStock){const i=Number(ds.minusStock);stocks[i].qty=Math.max(0,stocks[i].qty-1);save();renderStocks()}if(ds.editStock){const i=Number(ds.editStock);const name=prompt("품목명",stocks[i].name);const price=Number(prompt("가격",stocks[i].price));const qty=Number(prompt("재고량",stocks[i].qty));if(name&&price>=0&&qty>=0){stocks[i]={name,price,qty};save();renderStocks();showToast("수정되었습니다.")}}if(ds.delDeal){deals.splice(Number(ds.delDeal),1);save();renderDeals();showToast("특가가 삭제되었습니다.")}if(ds.minusDeal){const i=Number(ds.minusDeal);deals[i].qty=Math.max(0,deals[i].qty-1);save();renderDeals()}if(ds.editDeal){const i=Number(ds.editDeal);const name=prompt("특가명",deals[i].name);const price=Number(prompt("가격",deals[i].price));const qty=Number(prompt("재고량",deals[i].qty));const open=prompt("오픈시간",deals[i].open);if(name&&price>=0&&qty>=0&&open){deals[i]={name,price,qty,open};save();renderDeals();showToast("특가가 수정되었습니다.")}}});
    renderStocks();renderDeals();
  </script>
</body>
</html>
