<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>풍무농산 장바구니</title>
  <style>
    @import url("https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css");
    @import url("https://fonts.googleapis.com/css2?family=Song+Myung&display=swap");
    :root{--ink:#07110d;--muted:#66716b;--line:#e2e8e2;--paper:#fffefa;--soft:#f5f8f3;--green:#06483e;--teal:#087465;--mint:#e7f4ee;--red:#d94435}
    *{box-sizing:border-box}body{margin:0;min-width:320px;color:var(--ink);font-family:"SUIT Variable",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#eaf0eb}button,input,textarea{font:inherit;color:inherit}button{border:0;background:none;cursor:pointer}.app{max-width:480px;min-height:100vh;margin:0 auto;background:#fbfcf7;box-shadow:0 0 0 1px rgba(0,0,0,.06)}
    .topbar{position:sticky;top:0;z-index:10;height:82px;display:grid;grid-template-columns:74px 1fr 74px;align-items:center;padding:12px 13px;background:rgba(255,254,250,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(18px)}.brand{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;font-family:"Song Myung",serif;font-size:26px;line-height:1;pointer-events:none}.brand small{display:block;margin-top:6px;color:var(--teal);font-family:"SUIT Variable";font-size:12px;font-weight:950}.nav{height:43px;border-radius:11px;color:var(--green);background:var(--mint);font-size:12px;font-weight:950}
    .page{padding:14px 12px 120px}.section{margin-top:12px;padding:15px;border:1px solid var(--line);border-radius:14px;background:var(--paper)}.head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}h1{margin:0;font-size:21px;font-weight:950}.chip{padding:6px 10px;border-radius:999px;color:var(--green);background:var(--mint);font-size:12px;font-weight:950}.item{display:grid;gap:10px;padding:13px 0;border-top:1px solid var(--line)}.item:first-of-type{border-top:0}.item strong{font-size:16px;font-weight:950}.item span{display:block;margin-top:4px;color:#53615a;font-size:13px;font-weight:800}.item-actions{display:grid;grid-template-columns:1fr 76px;gap:8px}.stepper{height:42px;display:grid;grid-template-columns:42px 1fr 42px;border:1px solid #aeb9b2;border-radius:11px;background:#fff;text-align:center;align-items:center}.stepper button{height:100%;font-size:20px}.remove{height:42px;border-radius:10px;color:#fff;background:var(--red);font-size:13px;font-weight:900}.field{display:grid;gap:6px;margin-top:10px}.field label{color:#5f6b65;font-size:12px;font-weight:900}.input,.memo{width:100%;padding:12px 13px;border:0;border-radius:12px;background:var(--soft);outline:1px solid transparent;font-weight:850}.input{height:48px}.memo{min-height:86px;resize:vertical}.input:focus,.memo:focus{outline-color:var(--teal);background:#fff}.checks{display:grid;gap:9px;margin-top:12px}.check{display:flex;gap:8px;align-items:flex-start;color:#24302a;font-size:14px;font-weight:850}.check input{width:18px;height:18px;accent-color:var(--green)}.payments{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}.pay input{position:absolute;opacity:0}.pay span{height:43px;display:grid;place-items:center;border:1px solid var(--line);border-radius:11px;background:#fff;font-size:13px;font-weight:950}.pay input:checked+span{color:#fff;background:var(--green);border-color:var(--green)}.summary{display:grid;gap:9px}.line{display:flex;justify-content:space-between;gap:12px;font-weight:850}.line b{font-size:19px}.bottom{position:fixed;left:50%;bottom:0;width:min(480px,100%);padding:10px 10px calc(10px + env(safe-area-inset-bottom));background:rgba(251,252,247,.95);border-top:1px solid var(--line);backdrop-filter:blur(16px)}.submit{width:100%;height:54px;border-radius:12px;color:#fff;background:var(--green);font-size:18px;font-weight:950}.empty{padding:34px 0;color:var(--muted);text-align:center;font-weight:850}.toast{position:fixed;left:50%;bottom:84px;width:min(440px,calc(100% - 28px));transform:translateX(-50%);padding:13px;border-radius:12px;color:#fff;background:rgba(6,72,62,.96);text-align:center;font-weight:950;opacity:0;transition:.2s}.toast.show{opacity:1}
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar"><button class="nav" onclick="location.href='index.html'">뒤로</button><div class="brand">풍무농산<small>장바구니</small></div><button class="nav" onclick="location.href='history.html'">내역</button></header>
    <section class="page">
      <section class="section"><div class="head"><h1>담은 품목</h1><span class="chip" id="itemCount">0개</span></div><div id="cartItems"></div></section>
      <section class="section"><div class="head"><h1>주문 정보</h1><span class="chip">아라동 확인</span></div><div class="field"><label for="name">이름</label><input class="input" id="name" autocomplete="name"></div><div class="field"><label for="phone">전화번호</label><input class="input" id="phone" inputmode="tel" autocomplete="tel"></div><div class="field"><label for="address">주소</label><input class="input" id="address" autocomplete="street-address" placeholder="아라동 상세주소"></div><div class="checks"><label class="check"><input type="checkbox" id="saveInfo"> 이름, 전화번호, 주소 저장하기</label><label class="check"><input type="checkbox" id="araCheck"> 아라동만 배달 가능함을 확인했습니다.</label></div><div class="field"><label>결제방법</label><div class="payments"><label class="pay"><input type="radio" name="payment" value="계좌이체" checked><span>계좌이체</span></label><label class="pay"><input type="radio" name="payment" value="현장결제"><span>현장결제</span></label><label class="pay"><input type="radio" name="payment" value="카드결제"><span>카드결제</span></label></div></div><div class="field"><label for="memo">요청사항</label><textarea class="memo" id="memo" placeholder="문 앞, 부재 시 연락 등"></textarea></div><div class="checks"><label class="check"><input type="checkbox" id="saveMemo"> 요청사항 저장하기</label></div></section>
      <section class="section"><div class="summary"><div class="line"><span>상품 수량</span><b id="totalQty">0개</b></div><div class="line"><span>결제 예정금액</span><b id="totalPrice">0원</b></div></div></section>
    </section>
    <nav class="bottom"><button class="submit" id="submitOrder">주문 접수하기</button></nav>
  </main>
  <div class="toast" id="toast"></div>
  <script>
    let cart=JSON.parse(localStorage.getItem("pungmuCart")||"[]");
    const money=(v)=>Number(v).toLocaleString("ko-KR")+"원";const toast=document.querySelector("#toast");function showToast(msg){toast.textContent=msg;toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),1700)}
    function saveCart(){localStorage.setItem("pungmuCart",JSON.stringify(cart))}
    function totals(){return{qty:cart.reduce((s,i)=>s+i.qty,0),price:cart.reduce((s,i)=>s+i.qty*i.price,0)}}
    function render(){const total=totals();itemCount.textContent=`${total.qty}개`;totalQty.textContent=`${total.qty}개`;totalPrice.textContent=money(total.price);cartItems.innerHTML=cart.length?cart.map((item)=>`<div class="item"><div><strong>${item.name}</strong><span>${money(item.price)} / 최대 ${item.limit||5}개</span></div><div class="item-actions"><div class="stepper"><button type="button" data-minus="${item.id}">-</button><b>${item.qty}</b><button type="button" data-plus="${item.id}">+</button></div><button type="button" class="remove" data-remove="${item.id}">삭제</button></div></div>`).join(""):`<div class="empty">장바구니가 비어 있습니다.</div>`}
    function clearCart(){cart=[];saveCart();render();showToast("장바구니를 비웠습니다.")}
    function loadSaved(){const info=JSON.parse(localStorage.getItem("pungmuCustomer")||"null");if(info){name.value=info.name||"";phone.value=info.phone||"";address.value=info.address||"";saveInfo.checked=true}const savedMemo=localStorage.getItem("pungmuMemo");if(savedMemo){memo.value=savedMemo;saveMemo.checked=true}}
    document.body.addEventListener("click",(event)=>{const ds=event.target.dataset;if(ds.plus||ds.minus){const id=ds.plus||ds.minus;cart=cart.map((item)=>item.id===id?{...item,qty:Math.max(1,Math.min(item.limit||5,item.qty+(ds.plus?1:-1)))}:item);saveCart();render()}if(ds.remove){cart=cart.filter((item)=>item.id!==ds.remove);saveCart();render()}});
    submitOrder.addEventListener("click",()=>{if(!cart.length)return showToast("담긴 품목이 없습니다.");if(!name.value.trim()||!phone.value.trim()||!address.value.trim())return showToast("이름, 전화번호, 주소를 입력해주세요.");if(!araCheck.checked)return showToast("아라동 배달 확인이 필요합니다.");const total=totals();const order={id:String(Date.now()).slice(-6),status:"new",createdAt:new Date().toISOString(),name:name.value.trim(),phone:phone.value.trim(),address:address.value.trim(),memo:memo.value.trim(),payment:document.querySelector("input[name='payment']:checked").value,items:cart,total:total.price};const orders=JSON.parse(localStorage.getItem("pungmuOrders")||"[]");orders.unshift(order);localStorage.setItem("pungmuOrders",JSON.stringify(orders));if(saveInfo.checked)localStorage.setItem("pungmuCustomer",JSON.stringify({name:name.value.trim(),phone:phone.value.trim(),address:address.value.trim()}));else localStorage.removeItem("pungmuCustomer");if(saveMemo.checked)localStorage.setItem("pungmuMemo",memo.value.trim());else localStorage.removeItem("pungmuMemo");cart=[];saveCart();render();showToast("주문이 접수되었습니다.");setTimeout(()=>location.href="index.html",900)});
    loadSaved();render();
  </script>
</body>
</html>
