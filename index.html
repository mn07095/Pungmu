<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>풍무농산</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@700&family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap");

    :root {
      --ink: #171916;
      --muted: #737970;
      --line: #e5e7e2;
      --paper: #fffdf7;
      --soft: #f4f5ef;
      --green: #06452f;
      --green-2: #0c6a44;
      --leaf: #7d9d36;
      --orange: #f36f2b;
      --red: #db3b2f;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-width: 320px;
      color: var(--ink);
      font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
      background: #eef1ea;
      letter-spacing: 0;
    }
    button, input, textarea { font: inherit; color: inherit; }
    button { border: 0; background: none; cursor: pointer; -webkit-tap-highlight-color: transparent; }

    .app {
      max-width: 480px;
      min-height: 100vh;
      margin: 0 auto;
      background: var(--paper);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, .05);
      overflow-x: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      height: 72px;
      display: grid;
      grid-template-columns: 48px 1fr 70px;
      align-items: center;
      padding: 10px 14px;
      background: rgba(255, 253, 247, .94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }
    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--green);
    }
    .brand {
      text-align: center;
      font-family: "Gowun Batang", serif;
      font-size: 27px;
      font-weight: 700;
      line-height: 1;
      color: #080a07;
    }
    .admin-link {
      justify-self: end;
      min-width: 62px;
      height: 42px;
      border-radius: 8px;
      background: var(--soft);
      color: #343a34;
      font-size: 12px;
      font-weight: 800;
    }

    .hero {
      padding: 18px 18px 16px;
      background:
        linear-gradient(180deg, rgba(255,253,247,.1), var(--paper) 82%),
        url("https://images.pexels.com/photos/31979013/pexels-photo-31979013.jpeg?auto=compress&cs=tinysrgb&w=900&h=700&fit=crop") center/cover;
      border-bottom: 1px solid var(--line);
    }
    .hero-card {
      min-height: 174px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 18px;
      border-radius: 8px;
      color: #fff;
      background: linear-gradient(180deg, rgba(0,0,0,.12), rgba(5,47,34,.86));
      box-shadow: 0 18px 40px rgba(13, 45, 28, .22);
    }
    .eyebrow {
      display: inline-flex;
      width: fit-content;
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.18);
      font-size: 12px;
      font-weight: 800;
    }
    .hero h1 {
      margin: 9px 0 0;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 900;
      word-break: keep-all;
    }
    .hero-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .hero-meta div {
      padding: 10px;
      border-radius: 8px;
      background: rgba(255,255,255,.86);
      color: #1d241f;
      font-size: 12px;
      font-weight: 800;
    }
    .hero-meta b {
      display: block;
      margin-top: 2px;
      color: var(--green);
      font-size: 14px;
      font-weight: 900;
    }

    .date-tabs, .category-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 12px 16px;
      background: var(--paper);
      border-bottom: 1px solid var(--line);
      scrollbar-width: none;
    }
    .date-tabs::-webkit-scrollbar, .category-tabs::-webkit-scrollbar { display: none; }
    .date-tab, .category-tab {
      flex: 0 0 auto;
      border: 1px solid #d8ddd5;
      border-radius: 8px;
      background: #fff;
      font-weight: 900;
      white-space: nowrap;
    }
    .date-tab {
      min-width: 116px;
      padding: 9px 14px;
      text-align: center;
    }
    .date-tab span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .date-tab.active, .category-tab.active {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
    }
    .date-tab.active span { color: rgba(255,255,255,.76); }
    .category-tabs {
      position: sticky;
      top: 72px;
      z-index: 18;
      backdrop-filter: blur(14px);
      background: rgba(255,253,247,.94);
    }
    .category-tab {
      height: 40px;
      padding: 0 18px;
      font-size: 14px;
    }

    .products {
      padding: 0 12px 154px;
    }
    .product {
      padding: 18px 6px 16px;
      border-bottom: 1px solid var(--line);
    }
    .product-main {
      display: grid;
      grid-template-columns: 124px 1fr;
      gap: 14px;
    }
    .photo {
      width: 124px;
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      background: #dfe6d8 center/cover;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.05);
    }
    .product h2 {
      margin: 0 0 6px;
      font-size: 20px;
      line-height: 1.28;
      font-weight: 900;
      word-break: keep-all;
    }
    .price {
      font-size: 16px;
      font-weight: 800;
    }
    .price b {
      font-size: 23px;
      font-weight: 900;
    }
    .stock {
      margin-top: 7px;
      color: var(--red);
      font-size: 16px;
      font-weight: 900;
    }
    .note {
      margin-top: 5px;
      color: #515850;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.45;
    }
    .actions {
      display: grid;
      grid-template-columns: minmax(96px, .8fr) 1.4fr;
      gap: 9px;
      margin-top: 13px;
    }
    .detail-btn, .stepper {
      height: 54px;
      border: 1px solid #cfd6cd;
      border-radius: 8px;
      background: #fff;
      font-weight: 900;
    }
    .stepper {
      display: grid;
      grid-template-columns: 52px 1fr 52px;
      align-items: center;
      overflow: hidden;
    }
    .stepper button {
      height: 100%;
      font-size: 26px;
      font-weight: 900;
    }
    .stepper strong {
      text-align: center;
      font-size: 19px;
      font-weight: 900;
    }
    .stepper button:active, .detail-btn:active { background: #edf4e8; }

    .bottom {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 25;
      width: min(480px, 100%);
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 10px;
      padding: 12px 12px calc(12px + var(--safe-bottom));
      background: rgba(255,253,247,.95);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }
    .bottom button {
      height: 56px;
      border-radius: 8px;
      font-size: 17px;
      font-weight: 900;
    }
    .history {
      border: 1px solid var(--green);
      color: var(--green);
      background: #fff;
    }
    .order {
      color: #fff;
      background: var(--green);
    }

    .sheet-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: flex-end;
      justify-content: center;
      background: rgba(0,0,0,.46);
    }
    .sheet-backdrop.open { display: flex; }
    .sheet {
      width: min(480px, 100%);
      max-height: 86vh;
      overflow-y: auto;
      padding: 18px 18px calc(18px + var(--safe-bottom));
      border-radius: 18px 18px 0 0;
      background: var(--paper);
      box-shadow: 0 -22px 60px rgba(0,0,0,.22);
    }
    .sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .sheet h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 900;
    }
    .close {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: var(--soft);
      font-size: 22px;
    }
    .detail-photo {
      width: 100%;
      aspect-ratio: 16 / 10;
      margin-bottom: 14px;
      border-radius: 8px;
      background: center/cover;
    }
    .detail-copy {
      color: #4f564f;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.68;
      white-space: pre-line;
    }
    .summary {
      display: grid;
      gap: 8px;
      padding: 14px;
      border-radius: 8px;
      background: var(--soft);
    }
    .summary-line {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      font-size: 15px;
      font-weight: 800;
    }
    .summary-line.total {
      padding-top: 10px;
      margin-top: 4px;
      border-top: 1px solid #dde2da;
      font-size: 20px;
      font-weight: 900;
    }
    .field {
      display: grid;
      gap: 6px;
      margin-top: 12px;
    }
    .field label {
      color: #5f665f;
      font-size: 12px;
      font-weight: 800;
    }
    .input {
      width: 100%;
      min-height: 50px;
      padding: 13px 14px;
      border: 0;
      border-radius: 8px;
      background: var(--soft);
      outline: 1px solid transparent;
      font-weight: 700;
    }
    .input:focus { outline-color: var(--green-2); background: #fff; }
    .radio-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .radio-row label {
      min-height: 50px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px;
      border: 1px solid #d5dbd3;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 800;
    }
    input[type="radio"] { accent-color: var(--green); }
    .submit {
      width: 100%;
      height: 56px;
      margin-top: 16px;
      border-radius: 8px;
      color: #fff;
      background: var(--green);
      font-size: 17px;
      font-weight: 900;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(88px + var(--safe-bottom));
      z-index: 60;
      width: min(440px, calc(100% - 28px));
      transform: translate(-50%, 16px);
      opacity: 0;
      pointer-events: none;
      padding: 14px 16px;
      border-radius: 8px;
      color: #fff;
      background: rgba(6,69,47,.96);
      font-weight: 900;
      text-align: center;
      transition: .22s ease;
    }
    .toast.show { transform: translate(-50%, 0); opacity: 1; }

    @media (max-width: 380px) {
      .topbar { grid-template-columns: 44px 1fr 62px; padding-inline: 10px; }
      .brand { font-size: 24px; }
      .hero h1 { font-size: 25px; }
      .product-main { grid-template-columns: 108px 1fr; gap: 12px; }
      .photo { width: 108px; }
      .product h2 { font-size: 18px; }
      .bottom { grid-template-columns: 104px 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <button class="icon-btn" type="button" aria-label="메뉴" id="storeButton">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      </button>
      <div class="brand">풍무농산</div>
      <button class="admin-link" type="button" onclick="location.href='admin.html'">관리자</button>
    </header>

    <section class="hero">
      <div class="hero-card">
        <span class="eyebrow">오늘 입고 · 한정 수량</span>
        <h1>과일과 채소만<br>가볍게 담아가세요</h1>
      </div>
      <div class="hero-meta">
        <div>픽업 시간<b>12:00 - 20:00</b></div>
        <div>접수 마감<b>오늘 밤 9시</b></div>
      </div>
    </section>

    <nav class="date-tabs" aria-label="행사일 선택">
      <button class="date-tab active" type="button">4월 24일 (금)<span>8개 상품 접수중</span></button>
      <button class="date-tab" type="button">4월 25일 (토)<span>6개 상품 예정</span></button>
      <button class="date-tab" type="button">4월 27일 (월)<span>5개 상품 예정</span></button>
    </nav>

    <nav class="category-tabs" aria-label="상품 카테고리">
      <button class="category-tab active" type="button" data-filter="all">전체</button>
      <button class="category-tab" type="button" data-filter="fruit">과일</button>
      <button class="category-tab" type="button" data-filter="veg">채소</button>
      <button class="category-tab" type="button" data-filter="today">오늘특가</button>
    </nav>

    <section class="products" id="products"></section>

    <nav class="bottom">
      <button class="history" type="button" id="historyButton">주문내역</button>
      <button class="order" type="button" id="orderButton">주문하기</button>
    </nav>
  </main>

  <div class="sheet-backdrop" id="sheetBackdrop" role="dialog" aria-modal="true">
    <section class="sheet" id="sheet"></section>
  </div>
  <div class="toast" id="toast">주문이 접수되었습니다.</div>

  <script>
    const products = [
      {
        id: "strawberry",
        category: "fruit",
        name: "담양 설향 딸기 600g",
        price: 7900,
        stock: 18,
        limit: 3,
        img: "https://images.pexels.com/photos/17616208/pexels-photo-17616208.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop",
        desc: "향이 진하고 과육이 단단한 설향 딸기입니다.\n무른 과일이라 당일 픽업을 권장합니다."
      },
      {
        id: "tomato",
        category: "fruit",
        name: "대추방울토마토 750g",
        price: 5900,
        stock: 25,
        limit: 4,
        img: "https://images.pexels.com/photos/29037015/pexels-photo-29037015.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop",
        desc: "껍질이 얇고 단맛이 좋은 대추방울토마토입니다.\n샐러드와 도시락 간식으로 좋아요."
      },
      {
        id: "orange",
        category: "fruit",
        name: "고당도 오렌지 6과",
        price: 6900,
        stock: 16,
        limit: 3,
        img: "https://images.pexels.com/photos/15722576/pexels-photo-15722576.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop",
        desc: "수분감 좋은 오렌지 6과 묶음입니다.\n새콤달콤한 과일을 찾는 분께 추천합니다."
      },
      {
        id: "lettuce",
        category: "veg",
        name: "쌈채소 모둠 한 팩",
        price: 4500,
        stock: 22,
        limit: 5,
        img: "https://images.pexels.com/photos/28768309/pexels-photo-28768309.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop",
        desc: "고기와 함께 먹기 좋은 쌈채소 모둠입니다.\n입고 물량 중 싱싱한 잎만 골라 담았습니다."
      },
      {
        id: "zucchini",
        category: "veg",
        name: "국내산 애호박 2입",
        price: 3900,
        stock: 17,
        limit: 5,
        img: "https://images.pexels.com/photos/29560751/pexels-photo-29560751.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop",
        desc: "찌개와 볶음에 쓰기 좋은 국내산 애호박입니다.\n표면이 단단한 물량으로 준비했습니다."
      },
      {
        id: "paprika",
        category: "today",
        name: "파프리카 혼합 3입",
        price: 4900,
        stock: 13,
        limit: 4,
        img: "https://images.pexels.com/photos/31979013/pexels-photo-31979013.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop",
        desc: "색감 좋은 파프리카 혼합 3입입니다.\n샐러드와 볶음용으로 활용하기 좋습니다."
      }
    ];

    const cart = new Map();
    const productWrap = document.querySelector("#products");
    const orderButton = document.querySelector("#orderButton");
    const sheetBackdrop = document.querySelector("#sheetBackdrop");
    const sheet = document.querySelector("#sheet");
    const toast = document.querySelector("#toast");

    const money = (value) => value.toLocaleString("ko-KR") + "원";
    const cartCount = () => [...cart.values()].reduce((sum, item) => sum + item.qty, 0);
    const cartTotal = () => [...cart.values()].reduce((sum, item) => sum + item.qty * item.price, 0);

    function updateButton() {
      const count = cartCount();
      orderButton.textContent = count ? `주문하기 (${count}개)` : "주문하기";
    }

    function render(filter = "all") {
      const list = filter === "all" ? products : products.filter((item) => item.category === filter);
      productWrap.innerHTML = list.map((item) => {
        const qty = cart.get(item.id)?.qty || 0;
        return `
          <article class="product">
            <div class="product-main">
              <div class="photo" style="background-image:url('${item.img}')" aria-hidden="true"></div>
              <div>
                <h2>${item.name}</h2>
                <div class="price">가격: <b>${money(item.price)}</b></div>
                <div class="stock">${item.stock}개 남았어요!</div>
                <div class="note">누적판매수량: ${(870 + item.stock * 9).toLocaleString("ko-KR")}<br>매장 픽업 가능</div>
              </div>
            </div>
            <div class="actions">
              <button class="detail-btn" type="button" data-detail="${item.id}">상세보기</button>
              <div class="stepper">
                <button type="button" data-minus="${item.id}" aria-label="수량 빼기">-</button>
                <strong>${qty}개</strong>
                <button type="button" data-plus="${item.id}" aria-label="수량 더하기">+</button>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    function changeQty(id, delta) {
      const item = products.find((product) => product.id === id);
      const current = cart.get(id)?.qty || 0;
      const qty = Math.max(0, Math.min(item.limit, current + delta));
      if (qty) cart.set(id, { ...item, qty });
      else cart.delete(id);
      render(document.querySelector(".category-tab.active").dataset.filter);
      updateButton();
    }

    function openSheet(html) {
      sheet.innerHTML = html;
      sheetBackdrop.classList.add("open");
      document.body.style.overflow = "hidden";
    }
    function closeSheet() {
      sheetBackdrop.classList.remove("open");
      document.body.style.overflow = "";
    }

    function detailSheet(item) {
      return `
        <div class="sheet-head">
          <h2>${item.name}</h2>
          <button class="close" type="button" data-close aria-label="닫기">×</button>
        </div>
        <div class="detail-photo" style="background-image:url('${item.img}')"></div>
        <div class="price">가격: <b>${money(item.price)}</b></div>
        <div class="stock">${item.stock}개 남았어요!</div>
        <p class="detail-copy">${item.desc}</p>
        <button class="submit" type="button" data-add="${item.id}">담기</button>
      `;
    }

    function orderSheet() {
      const items = [...cart.values()];
      const rows = items.length
        ? items.map((item) => `<div class="summary-line"><span>${item.name} × ${item.qty}</span><b>${money(item.price * item.qty)}</b></div>`).join("")
        : `<div class="summary-line"><span>선택한 상품이 없습니다</span><b>0원</b></div>`;
      return `
        <div class="sheet-head">
          <h2>주문서 작성</h2>
          <button class="close" type="button" data-close aria-label="닫기">×</button>
        </div>
        <div class="summary">
          ${rows}
          <div class="summary-line total"><span>합계</span><b>${money(cartTotal())}</b></div>
        </div>
        <div class="field"><label for="name">고객명 *</label><input class="input" id="name" value="김민서1057"></div>
        <div class="field"><label for="phone">전화번호 *</label><input class="input" id="phone" value="010-0000-1057"></div>
        <div class="field">
          <label>수령 방식</label>
          <div class="radio-row">
            <label><input type="radio" name="receive" checked> 픽업</label>
            <label><input type="radio" name="receive"> 배송 문의</label>
          </div>
        </div>
        <div class="field"><label for="memo">요청사항</label><textarea class="input" id="memo" rows="3" placeholder="예: 7시에 찾으러 갈게요"></textarea></div>
        <button class="submit" type="button" data-submit ${items.length ? "" : "disabled"}>주문 접수하기</button>
      `;
    }

    function historySheet() {
      return `
        <div class="sheet-head">
          <h2>주문내역</h2>
          <button class="close" type="button" data-close aria-label="닫기">×</button>
        </div>
        <div class="summary">
          <div class="summary-line"><span>대추방울토마토 2개</span><b>11,800원</b></div>
          <div class="summary-line"><span>상태</span><b>접수</b></div>
        </div>
      `;
    }

    function storeSheet() {
      return `
        <div class="sheet-head">
          <h2>매장 정보</h2>
          <button class="close" type="button" data-close aria-label="닫기">×</button>
        </div>
        <div class="summary">
          <div class="summary-line"><span>매장명</span><b>풍무농산</b></div>
          <div class="summary-line"><span>픽업</span><b>12:00 - 20:00</b></div>
          <div class="summary-line"><span>지역</span><b>김포 풍무동</b></div>
        </div>
      `;
    }

    productWrap.addEventListener("click", (event) => {
      const plus = event.target.closest("[data-plus]");
      const minus = event.target.closest("[data-minus]");
      const detail = event.target.closest("[data-detail]");
      if (plus) changeQty(plus.dataset.plus, 1);
      if (minus) changeQty(minus.dataset.minus, -1);
      if (detail) openSheet(detailSheet(products.find((item) => item.id === detail.dataset.detail)));
    });

    document.querySelectorAll(".category-tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".category-tab").forEach((item) => item.classList.remove("active"));
        tab.classList.add("active");
        render(tab.dataset.filter);
      });
    });
    document.querySelectorAll(".date-tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".date-tab").forEach((item) => item.classList.remove("active"));
        tab.classList.add("active");
      });
    });

    sheetBackdrop.addEventListener("click", (event) => {
      if (event.target === sheetBackdrop || event.target.closest("[data-close]")) closeSheet();
      const add = event.target.closest("[data-add]");
      if (add) {
        changeQty(add.dataset.add, 1);
        closeSheet();
      }
      if (event.target.closest("[data-submit]")) {
        closeSheet();
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2200);
      }
    });
    orderButton.addEventListener("click", () => openSheet(orderSheet()));
    document.querySelector("#historyButton").addEventListener("click", () => openSheet(historySheet()));
    document.querySelector("#storeButton").addEventListener("click", () => openSheet(storeSheet()));

    render();
    updateButton();
  </script>
</body>
</html>
