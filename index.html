<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>풍무농산</title>
  <style>
    @import url("https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css");
    @import url("https://fonts.googleapis.com/css2?family=Song+Myung&display=swap");
    :root{--ink:#07110d;--muted:#66716b;--line:#e2e8e2;--paper:#fffefa;--soft:#f5f8f3;--green:#06483e;--teal:#087465;--mint:#e7f4ee;--gold:#d49a24;--red:#d94435}
    *{box-sizing:border-box} body{margin:0;min-width:320px;color:var(--ink);font-family:"SUIT Variable",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#eaf0eb} button{border:0;background:none;color:inherit;font:inherit;cursor:pointer}
    .app{max-width:480px;min-height:100vh;margin:0 auto;background:#fbfcf7;box-shadow:0 0 0 1px rgba(0,0,0,.06)}
    .topbar{position:sticky;top:0;z-index:20;height:96px;display:grid;grid-template-columns:54px 1fr 108px;align-items:center;padding:12px 14px;background:rgba(255,254,250,.97);border-bottom:1px solid var(--line);backdrop-filter:blur(18px)}
    .icon{width:44px;height:44px;display:grid;place-items:center;border-radius:12px}.icon:active{background:var(--soft)}
    .tools{display:flex;justify-content:flex-end;gap:6px}.brand{text-align:center}.brand-name{font-family:"Song Myung",serif;font-size:29px;line-height:1;letter-spacing:0}.branch{margin-top:6px;color:var(--teal);font-size:13px;font-weight:950}
    .dates{display:flex;justify-content:center;gap:8px;padding:10px 10px 8px;background:#fbfcf7;border-bottom:1px solid var(--line);overflow-x:auto}.date{min-width:124px;padding:11px 12px;border:1px solid var(--line);border-radius:12px;background:#fff;text-align:center;font-weight:950}.date strong{display:block;font-size:16px}.date span{display:block;margin-top:4px;color:#53615a;font-size:12px}.date.active{color:#fff;background:linear-gradient(135deg,var(--teal),var(--green));border-color:var(--teal)}.date.active span{color:#dff4ed}
    .categories{display:flex;gap:8px;padding:10px 12px;overflow:auto}.category{flex:0 0 auto;height:38px;padding:0 15px;border:1px solid var(--line);border-radius:999px;background:#fff;font-size:14px;font-weight:950}.category.active{color:#fff;background:var(--green);border-color:var(--green)}
    .list{padding:0 10px 104px}.deal-wrap{margin:8px 0 12px;padding:10px;border-radius:18px;background:linear-gradient(135deg,#fff6df,#fdfbf5);border:1px solid #ead7a7}.deal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}.deal-head b{font-size:17px;font-weight:950}.deal-head span{padding:6px 10px;border-radius:999px;color:#fff;background:var(--gold);font-size:12px;font-weight:950}
    .product{padding:14px 0;border-top:1px solid var(--line)}.deal-wrap .product{padding:0;border-top:0}.main{display:grid;grid-template-columns:124px 1fr;gap:14px;align-items:start}.photo{position:relative;width:124px;aspect-ratio:1/1;border-radius:12px;background-size:cover;background-position:center;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}.label{position:absolute;left:8px;top:8px;max-width:calc(100% - 16px);padding:5px 7px;border-radius:8px;color:#fff;background:rgba(6,72,62,.92);font-size:11px;font-weight:950}
    h2{margin:1px 0 5px;font-size:20px;line-height:1.18;font-weight:950;letter-spacing:0}.price{font-size:17px;font-weight:800}.price b{font-size:21px}.stock{margin-top:4px;color:#07110d;font-size:18px;font-weight:950}.meta{margin-top:5px;color:#46534d;font-size:14px;line-height:1.45;font-weight:760}
    .actions{display:grid;grid-template-columns:1fr 1fr 138px;gap:8px;margin-top:12px}.actions button,.stepper{height:48px;border:1px solid #aeb9b2;border-radius:12px;background:#fff;font-weight:950}.cart-add{color:#fff;background:var(--green)!important;border-color:var(--green)!important}.stepper{display:grid;grid-template-columns:42px 1fr 42px;align-items:center;text-align:center}.stepper button{width:100%;height:100%;font-size:24px}.stepper strong{font-size:17px}
    .bottom{position:fixed;left:50%;bottom:0;z-index:30;width:min(480px,100%);display:grid;grid-template-columns:118px 1fr;gap:10px;padding:10px 10px calc(10px + env(safe-area-inset-bottom));background:rgba(251,252,247,.94);border-top:1px solid var(--line);backdrop-filter:blur(16px)}.bottom button{height:54px;border-radius:12px;font-size:18px;font-weight:950}.history{border:1px solid var(--green);background:#fff}.cart{color:#fff;background:var(--green)}
    .sheet-backdrop{position:fixed;inset:0;z-index:40;display:none;align-items:end;background:rgba(0,0,0,.32)}.sheet-backdrop.open{display:flex}.sheet{width:min(480px,100%);max-height:82vh;margin:0 auto;padding:18px 16px calc(18px + env(safe-area-inset-bottom));border-radius:22px 22px 0 0;background:#fffefa;overflow:auto}.sheet-head{display:flex;justify-content:space-between;gap:12px;align-items:center}.close{width:40px;height:40px;border-radius:50%;background:var(--soft);font-size:22px}.detail-photo{width:100%;aspect-ratio:16/11;margin:14px 0;border-radius:16px;background-size:cover;background-position:center}.detail-copy{white-space:pre-line;color:#49534e;font-weight:750;line-height:1.55}.input{width:100%;height:48px;margin-top:12px;padding:12px 14px;border:0;border-radius:12px;background:var(--soft);font-weight:850;outline:1px solid transparent}.input:focus{outline-color:var(--teal);background:#fff}.submit{width:100%;height:52px;margin-top:12px;border-radius:12px;color:#fff;background:var(--green);font-weight:950}.toast{position:fixed;left:50%;bottom:84px;z-index:60;width:min(440px,calc(100% - 28px));transform:translateX(-50%);padding:13px 14px;border-radius:13px;color:#fff;background:rgba(6,72,62,.96);text-align:center;font-weight:950;opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1}
    @media(max-width:380px){.topbar{grid-template-columns:48px 1fr 96px;padding-inline:8px}.brand-name{font-size:25px}.main{grid-template-columns:112px 1fr;gap:11px}.photo{width:112px}h2{font-size:18px}.actions{grid-template-columns:1fr 1fr}.stepper{grid-column:1/3}}
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <button class="icon" type="button" id="storeButton" aria-label="메뉴"><svg width="29" height="29" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg></button>
      <div class="brand"><div class="brand-name">풍무농산</div><div class="branch">- 풍무점 -</div></div>
      <div class="tools">
        <button class="icon" type="button" id="searchButton" aria-label="검색"><svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="m21 21-4.3-4.3M10.8 18.2a7.4 7.4 0 1 1 0-14.8 7.4 7.4 0 0 1 0 14.8Z" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"/></svg></button>
        <button class="icon" type="button" id="cartButton" aria-label="장바구니"><svg width="29" height="29" viewBox="0 0 24 24" fill="none"><path d="M6.4 7.2h13.2l-1.4 7.4H8.1L6.4 7.2ZM6.4 7.2 5.8 4.6H3.7M9.2 20.1a1.2 1.2 0 1 0 0-2.4 1.2 1.2 0 0 0 0 2.4ZM17.2 20.1a1.2 1.2 0 1 0 0-2.4 1.2 1.2 0 0 0 0 2.4Z" stroke="currentColor" stroke-width="2.05" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </div>
    </header>
    <nav class="dates" aria-label="행사 날짜">
      <button class="date active"><strong>4월 24일 (금)</strong><span>9개 상품 접수중</span></button>
      <button class="date"><strong>4월 25일 (토)</strong><span>6개 상품 예정</span></button>
      <button class="date"><strong>4월 27일 (월)</strong><span>5개 상품 예정</span></button>
    </nav>
    <nav class="categories">
      <button class="category active" data-filter="all">전체</button>
      <button class="category" data-filter="fruit">과일</button>
      <button class="category" data-filter="veg">채소</button>
      <button class="category" data-filter="today">특가</button>
    </nav>
    <section class="list" id="productList"></section>
    <nav class="bottom">
      <button class="history" type="button" id="historyButton">주문내역</button>
      <button class="cart" type="button" id="orderButton">장바구니</button>
    </nav>
  </main>
  <div class="sheet-backdrop" id="sheetBackdrop"><section class="sheet" id="sheet"></section></div>
  <div class="toast" id="toast"></div>
  <script>
    const products=[
      {id:"paprika",category:"today",badge:"오늘특가",name:"파프리카 혼합 3입",price:4900,stock:13,sold:1105,limit:4,opensAt:"오후 2시 오픈",img:"https://images.pexels.com/photos/128536/pexels-photo-128536.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop",desc:"선명한 색감의 파프리카를 3입으로 담았습니다.\n샐러드, 볶음, 도시락용으로 쓰기 좋습니다."},
      {id:"strawberry",category:"fruit",badge:"담양 설향",name:"담양 설향딸기 600g",price:7900,stock:18,sold:2946,limit:3,img:"https://images.pexels.com/photos/89778/strawberries-frisch-ripe-sweet-89778.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop",desc:"박스에 가지런히 담긴 향 좋은 설향 딸기입니다.\n당일 선별 수량만 판매합니다."},
      {id:"tomato",category:"fruit",badge:"오늘입고",name:"대추방울토마토 750g",price:5900,stock:25,sold:9616,limit:4,img:"https://images.pexels.com/photos/2893635/pexels-photo-2893635.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop",desc:"탱글한 대추방울토마토를 박스 단위로 준비했습니다.\n아이 간식과 샐러드용으로 좋습니다."},
      {id:"apple",category:"fruit",badge:"가정용",name:"가정용 혼합사과 2kg",price:9900,stock:14,sold:1728,limit:3,img:"https://images.pexels.com/photos/1510392/pexels-photo-1510392.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop",desc:"먹음직스럽게 담긴 혼합 사과 박스입니다.\n가정에서 부담 없이 드시기 좋은 구성입니다."},
      {id:"grape",category:"fruit",badge:"씨없는",name:"씨없는 청포도 500g",price:8900,stock:12,sold:1320,limit:2,img:"https://images.pexels.com/photos/708777/pexels-photo-708777.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop",desc:"알이 단단하고 산뜻한 씨없는 청포도입니다.\n냉장 보관 후 차갑게 드시면 더 좋습니다."},
      {id:"orange",category:"fruit",badge:"고당도",name:"캘리포니아 오렌지 6과",price:6900,stock:16,sold:1842,limit:3,img:"https://images.pexels.com/photos/2090902/pexels-photo-2090902.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop",desc:"수분감이 좋은 오렌지 6과 묶음입니다.\n후식용 과일을 찾는 분께 추천합니다."},
      {id:"lettuce",category:"veg",badge:"싱싱쌈",name:"쌈채소 모둠 한 팩",price:4500,stock:22,sold:1574,limit:5,img:"https://images.pexels.com/photos/257259/pexels-photo-257259.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop",desc:"고기와 함께 먹기 좋은 쌈채소 모둠입니다.\n신선한 잎만 골라 담았습니다."},
      {id:"cucumber",category:"veg",badge:"시원",name:"백오이 3입",price:3500,stock:28,sold:2034,limit:5,img:"https://images.pexels.com/photos/2329440/pexels-photo-2329440.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop",desc:"무침과 샐러드에 좋은 백오이 3입입니다.\n단단하고 수분감 있는 물량입니다."},
      {id:"carrot",category:"veg",badge:"국내산",name:"흙당근 1kg",price:4200,stock:19,sold:1184,limit:4,img:"https://images.pexels.com/photos/143133/pexels-photo-143133.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop",desc:"요리용으로 쓰기 좋은 국내산 흙당근입니다.\n세척 후 냉장 보관해주세요."},
      {id:"zucchini",category:"veg",badge:"국내산",name:"애호박 2입",price:3900,stock:17,sold:928,limit:5,img:"https://images.pexels.com/photos/128420/pexels-photo-128420.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop",desc:"찌개와 볶음에 쓰기 좋은 애호박 2입입니다.\n표면이 단단한 물량으로 준비했습니다."}
    ];
    const cart=new Map(JSON.parse(localStorage.getItem("pungmuCart")||"[]").map((item)=>[item.id,item]));
    const productList=document.querySelector("#productList"),orderButton=document.querySelector("#orderButton"),sheetBackdrop=document.querySelector("#sheetBackdrop"),sheet=document.querySelector("#sheet"),toast=document.querySelector("#toast");
    const money=(value)=>value.toLocaleString("ko-KR")+"원";
    const cartCount=()=>[...cart.values()].reduce((sum,item)=>sum+item.qty,0);
    const saveCart=()=>localStorage.setItem("pungmuCart",JSON.stringify([...cart.values()]));
    function showToast(msg){toast.textContent=msg;toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),1700)}
    function updateOrderButton(){const count=cartCount();orderButton.textContent=count?`장바구니 (${count})`:"장바구니"}
    function productCard(item,isDeal=false){const qty=cart.get(item.id)?.qty||0;return `<article class="product ${isDeal?"deal":""}"><div class="main"><div class="photo" style="background-image:url('${item.img}')"><span class="label">${item.badge}</span></div><div><h2>${item.name}</h2><div class="price">가격: <b>${money(item.price)}</b></div><div class="stock">${item.stock}개 남았어요!</div><div class="meta">누적판매수량: ${item.sold.toLocaleString("ko-KR")}<br>${item.opensAt||"주문 확인 후 순차 배달"}</div></div></div><div class="actions"><button type="button" data-detail="${item.id}">상세보기</button><button class="cart-add" type="button" data-go-cart="${item.id}">담기</button><div class="stepper"><button type="button" data-minus="${item.id}">-</button><strong>${qty}개</strong><button type="button" data-plus="${item.id}">+</button></div></div></article>`}
    function renderProducts(filter="all"){const list=filter==="all"?products:products.filter((item)=>item.category===filter);const deal=products.find((item)=>item.category==="today");const normal=list.filter((item)=>item.id!==deal.id);const dealHtml=(filter==="all"||filter==="today")?`<section class="deal-wrap"><div class="deal-head"><b>오늘 특가상품</b><span>${deal.opensAt}</span></div>${productCard(deal,true)}</section>`:"";productList.innerHTML=dealHtml+normal.map((item)=>productCard(item)).join("")}
    function changeQty(id,delta){const item=products.find((product)=>product.id===id);const current=cart.get(id)?.qty||0;const qty=Math.max(0,Math.min(item.limit,current+delta));if(qty)cart.set(id,{...item,qty});else cart.delete(id);saveCart();renderProducts(document.querySelector(".category.active").dataset.filter);updateOrderButton()}
    function goCart(id){if(id&&!cart.has(id)){const item=products.find((product)=>product.id===id);cart.set(id,{...item,qty:1});saveCart();updateOrderButton()}location.href="cart.html"}
    function openSheet(html){sheet.innerHTML=html;sheetBackdrop.classList.add("open");document.body.style.overflow="hidden"}function closeSheet(){sheetBackdrop.classList.remove("open");document.body.style.overflow=""}
    function detailSheet(item){return `<div class="sheet-head"><h2>${item.name}</h2><button class="close" type="button" data-close>×</button></div><div class="detail-photo" style="background-image:url('${item.img}')"></div><div class="price">가격: <b>${money(item.price)}</b></div><div class="stock">${item.stock}개 남았어요!</div><p class="detail-copy">${item.desc}</p><button class="submit" type="button" data-go-cart="${item.id}">장바구니로 이동</button>`}
    function searchSheet(){return `<div class="sheet-head"><h2>상품 검색</h2><button class="close" type="button" data-close>×</button></div><input class="input" id="searchInput" placeholder="딸기, 토마토, 사과"><button class="submit" type="button" id="searchSubmit">검색하기</button>`}
    function historySheet(){return `<div class="sheet-head"><h2>주문내역</h2><button class="close" type="button" data-close>×</button></div><p class="detail-copy">주문 완료 내역은 장바구니에서 주문 후 이곳에 표시됩니다.</p>`}
    function storeSheet(){return `<div class="sheet-head"><h2>풍무농산</h2><button class="close" type="button" data-close>×</button></div><p class="detail-copy">신선한 과일과 채소를 당일 공동구매 방식으로 준비합니다.</p>`}
    productList.addEventListener("click",(event)=>{const plus=event.target.closest("[data-plus]"),minus=event.target.closest("[data-minus]"),detail=event.target.closest("[data-detail]"),go=event.target.closest("[data-go-cart]");if(plus)changeQty(plus.dataset.plus,1);if(minus)changeQty(minus.dataset.minus,-1);if(detail)openSheet(detailSheet(products.find((item)=>item.id===detail.dataset.detail)));if(go)goCart(go.dataset.goCart)});
    document.querySelectorAll(".category").forEach((tab)=>tab.addEventListener("click",()=>{document.querySelectorAll(".category").forEach((item)=>item.classList.remove("active"));tab.classList.add("active");renderProducts(tab.dataset.filter)}));
    document.querySelectorAll(".date").forEach((tab)=>tab.addEventListener("click",()=>{document.querySelectorAll(".date").forEach((item)=>item.classList.remove("active"));tab.classList.add("active")}));
    sheetBackdrop.addEventListener("click",(event)=>{if(event.target===sheetBackdrop||event.target.closest("[data-close]"))closeSheet();const go=event.target.closest("[data-go-cart]");if(go)goCart(go.dataset.goCart)});
    orderButton.addEventListener("click",()=>{saveCart();location.href="cart.html"});document.querySelector("#cartButton").addEventListener("click",()=>{saveCart();location.href="cart.html"});document.querySelector("#historyButton").addEventListener("click",()=>openSheet(historySheet()));document.querySelector("#storeButton").addEventListener("click",()=>openSheet(storeSheet()));document.querySelector("#searchButton").addEventListener("click",()=>openSheet(searchSheet()));
    renderProducts();updateOrderButton();
  </script>
</body>
</html>
