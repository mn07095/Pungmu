<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>풍무농산</title>
  <style>
    @import url("https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css");
    @import url("https://fonts.googleapis.com/css2?family=Song+Myung&display=swap");

    :root {
      --ink: #080d0b;
      --muted: #6e7772;
      --line: #e2e7e3;
      --paper: #fffefa;
      --soft: #f5f7f3;
      --teal: #075f55;
      --teal-dark: #033f38;
      --mint: #e7f3ed;
      --gold: #d7a642;
      --red: #d94235;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-width: 320px;
      color: var(--ink);
      font-family: "SUIT Variable", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #edf1ec;
      letter-spacing: 0;
    }
    button, input, textarea { font: inherit; color: inherit; }
    button {
      border: 0;
      background: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      max-width: 480px;
      min-height: 100vh;
      margin: 0 auto;
      background: var(--paper);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, .06);
      overflow-x: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      height: 78px;
      display: grid;
      grid-template-columns: 84px 1fr 84px;
      align-items: center;
      gap: 6px;
      padding: 10px 13px;
      background: rgba(255, 254, 250, .96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }
    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      color: #101513;
    }
    .icon-btn:active { background: var(--mint); }
    .brand {
      display: grid;
      place-items: center;
      line-height: 1.05;
      text-align: center;
      justify-self: center;
    }
    .brand-name {
      font-family: "Song Myung", serif;
      font-size: 25px;
      font-weight: 400;
      letter-spacing: 0;
    }
    .branch {
      margin-top: 4px;
      color: var(--teal);
      font-size: 13px;
      font-weight: 800;
    }
    .tools {
      justify-self: end;
      display: flex;
      gap: 2px;
      align-items: center;
    }

    .date-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      justify-content: center;
      padding: 7px 14px 10px;
      background: #fbfcf8;
      border-bottom: 1px solid var(--line);
      scrollbar-width: none;
    }
    .date-strip::-webkit-scrollbar { display: none; }
    .date {
      flex: 0 0 auto;
      min-width: 106px;
      padding: 8px 12px 7px;
      border: 1px solid #dbe1dc;
      border-radius: 10px;
      background: #fff;
      text-align: center;
      font-weight: 900;
    }
    .date strong {
      display: block;
      font-size: 14px;
      line-height: 1.15;
    }
    .date span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    .date.active {
      border-color: var(--teal);
      color: #fff;
      background: var(--teal);
      box-shadow: 0 8px 18px rgba(7, 95, 85, .18);
    }
    .date.active span { color: rgba(255,255,255,.74); }

    .notice {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px 18px;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    .notice b {
      display: block;
      font-size: 17px;
      font-weight: 950;
    }
    .notice span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }
    .notice-pill {
      padding: 8px 10px;
      border-radius: 999px;
      color: var(--teal-dark);
      background: var(--mint);
      font-size: 12px;
      font-weight: 950;
      white-space: nowrap;
    }

    .category-strip {
      position: sticky;
      top: 78px;
      z-index: 25;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 14px;
      background: rgba(255, 254, 250, .95);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
      scrollbar-width: none;
    }
    .category-strip::-webkit-scrollbar { display: none; }
    .category {
      flex: 0 0 auto;
      height: 38px;
      padding: 0 17px;
      border: 1px solid #d5dcd6;
      border-radius: 999px;
      background: #fff;
      font-size: 14px;
      font-weight: 900;
    }
    .category.active {
      color: #fff;
      border-color: var(--teal-dark);
      background: var(--teal-dark);
    }

    .product-list {
      padding: 0 10px 152px;
    }
    .product {
      padding: 22px 10px 16px;
      border-bottom: 1px solid var(--line);
    }
    .product-main {
      display: grid;
      grid-template-columns: 132px 1fr;
      gap: 16px;
      align-items: start;
    }
    .photo {
      width: 132px;
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      background: #e2e8df center/cover;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, .05);
    }
    .photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.02), rgba(0,0,0,.16));
      pointer-events: none;
    }
    .label {
      position: absolute;
      left: 8px;
      top: 8px;
      z-index: 1;
      padding: 5px 7px;
      border-radius: 999px;
      color: #fff;
      background: rgba(3, 63, 56, .88);
      font-size: 11px;
      font-weight: 950;
    }
    .product h2 {
      margin: -2px 0 6px;
      font-size: 21px;
      line-height: 1.25;
      font-weight: 950;
      word-break: keep-all;
    }
    .price {
      font-size: 17px;
      font-weight: 800;
    }
    .price b {
      font-size: 24px;
      font-weight: 950;
    }
    .stock {
      margin-top: 7px;
      color: var(--red);
      font-size: 17px;
      font-weight: 950;
    }
    .meta {
      margin-top: 5px;
      color: #313a35;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.45;
    }
    .actions {
      display: grid;
      grid-template-columns: minmax(98px, .75fr) minmax(98px, .75fr) minmax(160px, 1.25fr);
      gap: 10px;
      margin-top: 14px;
    }
    .detail-btn, .cart-add {
      height: 58px;
      border: 1px solid #bfc9c1;
      border-radius: 10px;
      background: #fff;
      font-size: 17px;
      font-weight: 900;
    }
    .cart-add {
      color: var(--teal-dark);
      background: var(--mint);
      border-color: #bed8cd;
    }
    .stepper {
      height: 58px;
      display: grid;
      grid-template-columns: 56px 1fr 56px;
      align-items: center;
      border: 1px solid #bfc9c1;
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
    }
    .stepper button {
      height: 100%;
      font-size: 28px;
      font-weight: 950;
    }
    .stepper strong {
      text-align: center;
      font-size: 20px;
      font-weight: 950;
    }
    .detail-btn:active, .cart-add:active, .stepper button:active { background: var(--mint); }

    .to-top {
      position: fixed;
      right: calc(50% - 226px);
      bottom: calc(98px + var(--safe-bottom));
      z-index: 22;
      width: 48px;
      height: 48px;
      border: 1px solid #0c1713;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.9);
      box-shadow: 0 10px 24px rgba(0,0,0,.12);
    }
    .bottom-bar {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 28;
      width: min(480px, 100%);
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: 118px 1fr;
      gap: 10px;
      padding: 12px 12px calc(12px + var(--safe-bottom));
      background: rgba(255, 254, 250, .96);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }
    .bottom-bar button {
      height: 58px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 950;
    }
    .history {
      border: 1px solid var(--teal);
      color: var(--teal-dark);
      background: #fff;
    }
    .order {
      color: #fff;
      background: var(--teal-dark);
    }

    .sheet-backdrop {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      align-items: flex-end;
      justify-content: center;
      background: rgba(0,0,0,.48);
    }
    .sheet-backdrop.open { display: flex; }
    .sheet {
      width: min(480px, 100%);
      max-height: 86vh;
      overflow-y: auto;
      padding: 18px 18px calc(18px + var(--safe-bottom));
      border-radius: 20px 20px 0 0;
      background: var(--paper);
      box-shadow: 0 -20px 60px rgba(0,0,0,.24);
    }
    .sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .sheet h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 950;
      word-break: keep-all;
    }
    .close {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--soft);
      font-size: 22px;
    }
    .detail-photo {
      width: 100%;
      aspect-ratio: 16 / 10;
      margin-bottom: 14px;
      border-radius: 12px;
      background: center/cover;
    }
    .detail-copy {
      color: #4f5853;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.68;
      white-space: pre-line;
    }
    .summary {
      display: grid;
      gap: 8px;
      padding: 14px;
      border-radius: 12px;
      background: var(--soft);
    }
    .summary-line {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      font-size: 15px;
      font-weight: 850;
    }
    .summary-line.total {
      padding-top: 10px;
      margin-top: 4px;
      border-top: 1px solid #dde4de;
      font-size: 20px;
      font-weight: 950;
    }
    .field {
      display: grid;
      gap: 6px;
      margin-top: 12px;
    }
    .field label {
      color: #606a65;
      font-size: 12px;
      font-weight: 900;
    }
    .input {
      width: 100%;
      min-height: 50px;
      padding: 13px 14px;
      border: 0;
      border-radius: 12px;
      background: var(--soft);
      outline: 1px solid transparent;
      font-weight: 800;
    }
    .input:focus { outline-color: var(--teal); background: #fff; }
    .radio-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .radio-row label {
      min-height: 50px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px;
      border: 1px solid #d5ddd6;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 850;
    }
    input[type="radio"] { accent-color: var(--teal); }
    .check-row {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid #d5ddd6;
      border-radius: 12px;
      background: #fff;
      font-size: 14px;
      font-weight: 850;
      line-height: 1.4;
    }
    .check-row input {
      width: 18px;
      height: 18px;
      margin-top: 1px;
      accent-color: var(--teal);
      flex: 0 0 auto;
    }
    .submit {
      width: 100%;
      height: 58px;
      margin-top: 16px;
      border-radius: 12px;
      color: #fff;
      background: var(--teal-dark);
      font-size: 18px;
      font-weight: 950;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(88px + var(--safe-bottom));
      z-index: 80;
      width: min(440px, calc(100% - 28px));
      transform: translate(-50%, 16px);
      opacity: 0;
      pointer-events: none;
      padding: 14px 16px;
      border-radius: 12px;
      color: #fff;
      background: rgba(3,63,56,.96);
      font-weight: 950;
      text-align: center;
      transition: .22s ease;
    }
    .toast.show { transform: translate(-50%, 0); opacity: 1; }

    @media (max-width: 380px) {
      .topbar { grid-template-columns: 74px 1fr 74px; padding-inline: 10px; }
      .brand-name { font-size: 22px; }
      .product-main { grid-template-columns: 112px 1fr; gap: 12px; }
      .photo { width: 112px; }
      .product h2 { font-size: 18px; }
      .actions { grid-template-columns: 1fr 1fr; }
      .stepper { grid-column: 1 / -1; }
      .bottom-bar { grid-template-columns: 106px 1fr; }
      .to-top { right: 16px; }
    }
    @media (min-width: 481px) {
      .to-top { right: calc(50% - 222px); }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <button class="icon-btn" type="button" aria-label="메뉴" id="storeButton">
        <svg width="27" height="27" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      </button>
      <div class="brand" aria-label="풍무농산">
        <div class="brand-name">풍무농산</div>
        <div class="branch">- 풍무점 -</div>
      </div>
      <div class="tools">
        <button class="icon-btn" type="button" aria-label="검색" id="searchButton">
          <svg width="27" height="27" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m21 21-4.3-4.3M10.8 18.2a7.4 7.4 0 1 1 0-14.8 7.4 7.4 0 0 1 0 14.8Z" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"/></svg>
        </button>
        <button class="icon-btn" type="button" aria-label="장바구니" id="cartButton">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6.4 7.2h13.2l-1.4 7.4H8.1L6.4 7.2ZM6.4 7.2 5.8 4.6H3.7M9.2 20.1a1.2 1.2 0 1 0 0-2.4 1.2 1.2 0 0 0 0 2.4ZM17.2 20.1a1.2 1.2 0 1 0 0-2.4 1.2 1.2 0 0 0 0 2.4Z" stroke="currentColor" stroke-width="2.05" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </header>

    <nav class="date-strip" aria-label="행사일 선택">
      <button class="date active" type="button"><strong>4월 24일 (금)</strong><span>9개 상품 접수중</span></button>
      <button class="date" type="button"><strong>4월 25일 (토)</strong><span>6개 상품 예정</span></button>
      <button class="date" type="button"><strong>4월 27일 (월)</strong><span>5개 상품 예정</span></button>
    </nav>

    <section class="notice">
      <div>
        <b>오늘 들어온 신선 상품</b>
        <span>오늘 준비한 과일·채소를 골라 담아보세요</span>
      </div>
      <div class="notice-pill">소량입고</div>
    </section>

    <nav class="category-strip" aria-label="상품 카테고리">
      <button class="category active" type="button" data-filter="all">전체</button>
      <button class="category" type="button" data-filter="fruit">과일</button>
      <button class="category" type="button" data-filter="veg">채소</button>
      <button class="category" type="button" data-filter="today">오늘특가</button>
    </nav>

    <section class="product-list" id="productList"></section>

    <button class="to-top" type="button" aria-label="맨 위로" id="topButton">
      <svg width="25" height="25" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 19V5M6.5 10.5 12 5l5.5 5.5" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <nav class="bottom-bar">
      <button class="history" type="button" id="historyButton">주문내역</button>
      <button class="order" type="button" id="orderButton">주문하기</button>
    </nav>
  </main>

  <div class="sheet-backdrop" id="sheetBackdrop" role="dialog" aria-modal="true">
    <section class="sheet" id="sheet"></section>
  </div>
  <div class="toast" id="toast">주문이 접수되었습니다.</div>

  <script>
    const products = [
      { id: "paprika", category: "today", badge: "오늘특가", name: "파프리카 혼합 3입", price: 4900, stock: 13, sold: 1105, limit: 4, opensAt: "오후 2시 오픈", img: "https://images.pexels.com/photos/37100272/pexels-photo-37100272.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop", desc: "빨강·노랑 파프리카 혼합 3입입니다.\n샐러드와 볶음용으로 활용하기 좋습니다." },
      { id: "strawberry", category: "fruit", badge: "담양 산지", name: "담양 설향딸기 600g", price: 7900, stock: 18, sold: 2946, limit: 3, img: "https://images.pexels.com/photos/7946844/pexels-photo-7946844.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop", desc: "박스 가득 담긴 향 진한 설향 딸기입니다.\n주문 확인 후 순차 배달됩니다." },
      { id: "tomato", category: "fruit", badge: "오늘 입고", name: "대추방울토마토 750g", price: 5900, stock: 25, sold: 9616, limit: 4, img: "https://images.pexels.com/photos/26950718/pexels-photo-26950718.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop", desc: "상자에 진열된 싱싱한 방울토마토입니다.\n샐러드와 도시락 간식으로 좋아요." },
      { id: "apple", category: "fruit", badge: "아삭", name: "가정용 혼합사과 2kg", price: 9900, stock: 14, sold: 1728, limit: 3, img: "https://images.pexels.com/photos/6097872/pexels-photo-6097872.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop", desc: "박스 진열된 여러 품종의 사과를 담았습니다.\n가정용으로 부담 없이 드시기 좋습니다." },
      { id: "orange", category: "fruit", badge: "고당도", name: "캘리포니아 오렌지 6과", price: 6900, stock: 16, sold: 1842, limit: 3, img: "https://images.pexels.com/photos/15722576/pexels-photo-15722576.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop", desc: "수분감 좋은 오렌지 6과 묶음입니다.\n새콤달콤한 과일을 찾는 분께 추천합니다." },
      { id: "grape", category: "fruit", badge: "달콤", name: "씨없는 청포도 500g", price: 8900, stock: 12, sold: 1320, limit: 2, img: "https://images.pexels.com/photos/32665722/pexels-photo-32665722.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop", desc: "알이 탱글한 포도 한 팩입니다.\n냉장 보관 후 차갑게 드시면 더 좋아요." },
      { id: "lettuce", category: "veg", badge: "쌈채소", name: "쌈채소 모둠 한 팩", price: 4500, stock: 22, sold: 1574, limit: 5, img: "https://images.pexels.com/photos/28768309/pexels-photo-28768309.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop", desc: "고기와 함께 먹기 좋은 쌈채소 모둠입니다.\n싱싱한 잎만 골라 담았습니다." },
      { id: "cucumber", category: "veg", badge: "시원", name: "백오이 3입", price: 3500, stock: 28, sold: 2034, limit: 5, img: "https://images.pexels.com/photos/2329440/pexels-photo-2329440.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop", desc: "무침과 샐러드에 좋은 백오이 3입입니다.\n단단하고 신선한 물량으로 준비했습니다." },
      { id: "carrot", category: "veg", badge: "국내산", name: "흙당근 1kg", price: 4200, stock: 19, sold: 1184, limit: 4, img: "https://images.pexels.com/photos/143133/pexels-photo-143133.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop", desc: "요리용으로 쓰기 좋은 국내산 흙당근입니다.\n세척 후 냉장 보관해주세요." },
      { id: "zucchini", category: "veg", badge: "국내산", name: "애호박 2입", price: 3900, stock: 17, sold: 928, limit: 5, img: "https://images.pexels.com/photos/29560751/pexels-photo-29560751.jpeg?auto=compress&cs=tinysrgb&w=700&h=700&fit=crop", desc: "찌개와 볶음에 쓰기 좋은 국내산 애호박입니다.\n표면이 단단한 물량으로 준비했습니다." }
    ];

    const cart = new Map();
    const productList = document.querySelector("#productList");
    const orderButton = document.querySelector("#orderButton");
    const sheetBackdrop = document.querySelector("#sheetBackdrop");
    const sheet = document.querySelector("#sheet");
    const toast = document.querySelector("#toast");

    const money = (value) => value.toLocaleString("ko-KR") + "원";
    const cartCount = () => [...cart.values()].reduce((sum, item) => sum + item.qty, 0);
    const cartTotal = () => [...cart.values()].reduce((sum, item) => sum + item.qty * item.price, 0);

    function updateOrderButton() {
      const count = cartCount();
      orderButton.textContent = count ? `주문하기 (${count}개)` : "주문하기";
    }

    function renderProducts(filter = "all") {
      const list = filter === "all" ? products : products.filter((item) => item.category === filter);
      productList.innerHTML = list.map((item) => {
        const qty = cart.get(item.id)?.qty || 0;
        return `
          <article class="product">
            <div class="product-main">
              <div class="photo" style="background-image:url('${item.img}')" aria-hidden="true">
                <span class="label">${item.badge}</span>
              </div>
              <div>
                <h2>${item.name}</h2>
                <div class="price">가격: <b>${money(item.price)}</b></div>
                <div class="stock">${item.stock}개 남았어요!</div>
                <div class="meta">누적판매수량: ${item.sold.toLocaleString("ko-KR")}<br>${item.opensAt || "주문 가능"}</div>
              </div>
            </div>
            <div class="actions">
              <button class="detail-btn" type="button" data-detail="${item.id}">상세보기</button>
              <button class="cart-add" type="button" data-add-cart="${item.id}">담기</button>
              <div class="stepper" aria-label="${item.name} 수량 선택">
                <button type="button" data-minus="${item.id}" aria-label="수량 빼기">-</button>
                <strong>${qty}개</strong>
                <button type="button" data-plus="${item.id}" aria-label="수량 더하기">+</button>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    function changeQty(id, delta) {
      const item = products.find((product) => product.id === id);
      const current = cart.get(id)?.qty || 0;
      const qty = Math.max(0, Math.min(item.limit, current + delta));
      if (qty) cart.set(id, { ...item, qty });
      else cart.delete(id);
      renderProducts(document.querySelector(".category.active").dataset.filter);
      updateOrderButton();
    }

    function openSheet(html) {
      sheet.innerHTML = html;
      sheetBackdrop.classList.add("open");
      document.body.style.overflow = "hidden";
    }
    function closeSheet() {
      sheetBackdrop.classList.remove("open");
      document.body.style.overflow = "";
    }

    function detailSheet(item) {
      return `
        <div class="sheet-head">
          <h2>${item.name}</h2>
          <button class="close" type="button" data-close aria-label="닫기">×</button>
        </div>
        <div class="detail-photo" style="background-image:url('${item.img}')"></div>
        <div class="price">가격: <b>${money(item.price)}</b></div>
        <div class="stock">${item.stock}개 남았어요!</div>
        <p class="detail-copy">${item.desc}</p>
        <button class="submit" type="button" data-add-cart="${item.id}">장바구니 담기</button>
      `;
    }

    function cartSheet() {
      const items = [...cart.values()];
      const rows = items.length
        ? items.map((item) => `<div class="summary-line"><span>${item.name} × ${item.qty}</span><b>${money(item.price * item.qty)}</b></div>`).join("")
        : `<div class="summary-line"><span>선택한 상품이 없습니다</span><b>0원</b></div>`;
      return `
        <div class="sheet-head">
          <h2>장바구니</h2>
          <button class="close" type="button" data-close aria-label="닫기">×</button>
        </div>
        <div class="summary">
          ${rows}
          <div class="summary-line total"><span>합계</span><b>${money(cartTotal())}</b></div>
        </div>
        <div class="field"><label for="name">고객명 *</label><input class="input" id="name" autocomplete="name" placeholder="이름을 입력하세요"></div>
        <div class="field"><label for="phone">전화번호 *</label><input class="input" id="phone" inputmode="tel" autocomplete="tel" placeholder="010-0000-0000"></div>
        <div class="field"><label for="address">아라동 배달 주소 *</label><input class="input" id="address" autocomplete="street-address" placeholder="아라동 상세 주소를 입력하세요"></div>
        <label class="check-row"><input type="checkbox"> 이름, 전화번호, 주소 저장하기</label>
        <label class="check-row"><input type="checkbox" required> 아라동만 배달 가능함을 확인했습니다</label>
        <div class="field">
          <label>결제방법 *</label>
          <div class="radio-row">
            <label><input type="radio" name="pay" checked> 계좌이체</label>
            <label><input type="radio" name="pay"> 현장결제</label>
          </div>
        </div>
        <div class="field"><label for="memo">요청사항</label><textarea class="input" id="memo" rows="3" placeholder="예: 문 앞에 놓아주세요"></textarea></div>
        <label class="check-row"><input type="checkbox"> 요청사항 저장하기</label>
        <button class="submit" type="button" data-submit ${items.length ? "" : "disabled"}>주문 접수하기</button>
      `;
    }

    function searchSheet() {
      return `
        <div class="sheet-head">
          <h2>상품 검색</h2>
          <button class="close" type="button" data-close aria-label="닫기">×</button>
        </div>
        <div class="field" style="margin-top:0">
          <label for="searchInput">상품명</label>
          <input class="input" id="searchInput" placeholder="예: 딸기, 오이, 사과">
        </div>
        <div class="summary" style="margin-top:12px">
          <div class="summary-line"><span>추천 검색어</span><b>딸기 · 오이 · 당근</b></div>
          <div class="summary-line"><span>배달 가능 지역</span><b>아라동</b></div>
        </div>
      `;
    }

    function historySheet() {
      return `
        <div class="sheet-head">
          <h2>주문내역</h2>
          <button class="close" type="button" data-close aria-label="닫기">×</button>
        </div>
        <div class="summary">
          <div class="summary-line"><span>아직 조회된 주문이 없습니다</span><b>-</b></div>
        </div>
      `;
    }

    function storeSheet() {
      return `
        <div class="sheet-head">
          <h2>매장 정보</h2>
          <button class="close" type="button" data-close aria-label="닫기">×</button>
        </div>
        <div class="summary">
          <div class="summary-line"><span>매장명</span><b>풍무농산</b></div>
          <div class="summary-line"><span>배달 지역</span><b>아라동 한정</b></div>
          <div class="summary-line"><span>배달 시간</span><b>주문 확인 후 순차 배달</b></div>
        </div>
      `;
    }

    productList.addEventListener("click", (event) => {
      const plus = event.target.closest("[data-plus]");
      const minus = event.target.closest("[data-minus]");
      const detail = event.target.closest("[data-detail]");
      const addCart = event.target.closest("[data-add-cart]");
      if (plus) changeQty(plus.dataset.plus, 1);
      if (minus) changeQty(minus.dataset.minus, -1);
      if (detail) openSheet(detailSheet(products.find((item) => item.id === detail.dataset.detail)));
      if (addCart) {
        changeQty(addCart.dataset.addCart, 1);
        toast.textContent = "장바구니에 담았습니다.";
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 1600);
      }
    });

    document.querySelectorAll(".category").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".category").forEach((item) => item.classList.remove("active"));
        tab.classList.add("active");
        renderProducts(tab.dataset.filter);
      });
    });
    document.querySelectorAll(".date").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".date").forEach((item) => item.classList.remove("active"));
        tab.classList.add("active");
      });
    });

    sheetBackdrop.addEventListener("click", (event) => {
      if (event.target === sheetBackdrop || event.target.closest("[data-close]")) closeSheet();
      const addCart = event.target.closest("[data-add-cart]");
      if (addCart) {
        changeQty(addCart.dataset.addCart, 1);
        closeSheet();
        toast.textContent = "장바구니에 담았습니다.";
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 1600);
      }
      if (event.target.closest("[data-submit]")) {
        closeSheet();
        toast.textContent = "주문이 접수되었습니다.";
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2200);
      }
    });

    orderButton.addEventListener("click", () => openSheet(cartSheet()));
    document.querySelector("#searchButton").addEventListener("click", () => {
      openSheet(searchSheet());
      requestAnimationFrame(() => document.querySelector("#searchInput")?.focus());
    });
    document.querySelector("#cartButton").addEventListener("click", () => openSheet(cartSheet()));
    document.querySelector("#historyButton").addEventListener("click", () => openSheet(historySheet()));
    document.querySelector("#storeButton").addEventListener("click", () => openSheet(storeSheet()));
    document.querySelector("#topButton").addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));

    renderProducts();
    updateOrderButton();
  </script>
</body>
</html>
